<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Sharon Vibe Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes wiggle {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(10deg); }
      50% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }

    .card {
      animation: floatIn 1s ease forwards;
      backdrop-filter: blur(10px);
    }

    .sparkle {
      display: inline-block;
      animation: wiggle 4s infinite;
    }

    .button:hover {
      transform: scale(1.1);
    }

    .button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-600 via-pink-500 to-indigo-600 p-6">

  <div class="w-full max-w-xl">
    <div class="card rounded-2xl shadow-2xl bg-white/20 border border-white/30 p-10 text-center space-y-6 text-white">
      <div class="text-5xl sparkle">✨</div>
      <h1 class="text-5xl font-bold">Hello Sharon ✨</h1>
      <p class="text-lg opacity-90">Welcome to your vibe coded website 🌈</p>
      <button class="button mt-4 px-6 py-3 rounded-2xl bg-white text-purple-600 font-semibold shadow-lg transition-transform">
        Let's Go
      </button>
    </div>
  </div>

</body>
</html>
